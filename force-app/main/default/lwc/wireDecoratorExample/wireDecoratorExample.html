<template>
         <article class="slds-card">
  <div class="slds-card__header slds-grid">
    <header class="slds-media slds-media_center slds-has-flexi-truncate">
    
      <div class="slds-media__body">
        <h2 class="slds-card__header-title">
          <a href="#" class="slds-card__header-link slds-truncate" title="Contacts (1)">
            <span>Top 5 Revenue Accounts</span>
          </a>
        </h2>   
      </div>
    </header>
  </div>
  <div class="slds-card__body">
    <table class="slds-table slds-table_cell-buffer slds-no-row-hover slds-table_bordered slds-table_fixed-layout" role="grid" aria-label="Example table in a Card">
      <thead>
        <tr class="slds-line-height_reset">
          <th class="" scope="col">
            <div class="slds-truncate" title="Name">Name</div>
          </th>
          <th class="" scope="col">
            <div class="slds-truncate" title="Company">AnnualRevenue</div>
          </th>
          <th class="" scope="col">
            <div class="slds-truncate" title="Title">Phone</div>
          </th>
          <th class="" scope="col">
            <div class="slds-truncate" title="Email">Rating</div>
          </th>
        </tr>
      </thead>
      <tbody>
      <template if:true={hasAccounts}>
         <template  for:each={accountsToDisplay} for:item="account">
         <tr key={account.Id} class="slds-hint-parent">
          
          <td role="gridcell">
            <div class="slds-truncate" title="Name">{account.Name}</div>
          </td>
          <td role="gridcell">
            <div class="slds-truncate" title="Annual Revenue">{account.AnnualRevenue}</div>
          </td>
          <td role="gridcell">
            <div class="slds-truncate" title="adam@company.com">{account.Phone}</div>
          </td>
           <td role="gridcell">
            <div class="slds-truncate" title="adam@company.com">{account.Rating}</div>
          </td>
        </tr>
       </template>
      </template>
      </tbody>
    </table>
  </div>
  <template if:false={hasAccounts}>
    <div class="slds-align_absolute-center slds-p-around_large">
        No Accounts Found
    </div>
</template>
</article>



</template>
